{% extends 'base.html' %}
{% load static %}

{% block layout %}
<!-- Split Layout Container -->
<main class="w-full flex min-h-screen selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- Left Panel: Editorial/Brand Imagery (Hidden on small screens) -->
    <section
        class="hidden lg:flex lg:w-1/2 relative bg-surface-container-high dark:bg-gray-800 overflow-hidden items-center justify-center">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0"
            style="background-image: url('{% static 'images/logeofond.jpeg' %}'); background-size: cover; background-position: top left; background-repeat: no-repeat;"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/10 to-transparent z-10"></div>

        <!-- Minimalist Brand Badge Overlay -->
        <div class="relative z-20 self-end mb-[32px] ml-[32px] bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-lg rounded-xl shadow-lg max-w-sm border border-outline-variant/20 dark:border-gray-700"
            style="margin-bottom: 2rem; margin-left: 2rem;">
            <div class="flex items-center gap-sm mb-sm">
                <span class="material-symbols-outlined text-primary dark:text-blue-400 text-[32px]"
                    style="font-variation-settings: 'FILL' 1;">school</span>
                <h2 class="font-h3 text-h3 text-on-surface dark:text-white">La Dolorosa</h2>
            </div>
            <p class="font-body-sm text-body-sm text-on-surface-variant dark:text-gray-400">Sistema oficial de gestión académica y control
                de horarios.</p>
        </div>
    </section>

    <!-- Right Panel: Canvas -->
    <section class="w-full lg:w-1/2 flex items-center justify-center p-lg sm:p-[32px] bg-surface dark:bg-gray-900">
        {% block auth_content %}{% endblock %}
    </section>
</main>

<!-- Floating Help Button -->
<div class="help-fab-wrapper">
    <span class="help-fab-tooltip">Ayuda</span>
    <button onclick="abrirAyuda()" class="help-fab" id="help-fab-auth" aria-label="Abrir ayuda">
        <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">help</span>
    </button>
</div>
{% endblock %}
